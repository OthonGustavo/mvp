<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segurança Profissional - Pilates RENOVAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --renovar-primary: #2D5A27;
        }
    </style>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="areadoutor.html" class="flex-shrink-0 flex items-center hover:opacity-80 transition">
                    <span class="text-2xl font-bold text-green-800 tracking-tighter uppercase">RENOVAR<span
                            class="text-green-500">.</span></span>
                </a>
                <div class="flex items-center space-x-4 border-l pl-6 border-gray-100">
                    <div class="flex items-center space-x-3 text-right">
                        <div class="hidden sm:block leading-none">
                            <p class="text-sm font-black text-gray-800 italic">Dr. Othon Gustavo</p>
                            <p class="text-[10px] text-green-600 font-bold uppercase tracking-widest text-right">Segurança</p>
                        </div>
                        <img src="https://ui-avatars.com/api/?name=Othon+Gustavo&background=2D5A27&color=fff"
                            class="w-10 h-10 rounded-full border-2 border-green-600 shadow-sm">
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex flex-1 max-w-7xl mx-auto w-full">
        <aside class="w-64 bg-white shadow-sm hidden md:flex flex-col border-r border-gray-100 mt-6 rounded-tr-3xl">
            <nav class="mt-10 flex-1 px-4 space-y-2">
                <a href="areadoutor.html"
                    class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 hover:bg-green-50 rounded-xl transition">
                    <i class="fas fa-home mr-3 text-lg"></i> Início do Painel
                </a>
                <a href="perfildoutor.html"
                    class="flex items-center px-4 py-3 text-sm font-medium text-gray-600 hover:bg-green-50 rounded-xl transition">
                    <i class="fas fa-user-md mr-3 text-lg"></i> Perfil Profissional
                </a>
                <a href="segurancadoutor.html"
                    class="bg-green-50 text-green-800 flex items-center px-4 py-3 text-sm font-bold rounded-xl border-l-4 border-green-700">
                    <i class="fas fa-shield-alt mr-3 text-lg"></i> Segurança
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-10">
            <h1 class="text-3xl font-black text-gray-800 tracking-tight italic mb-8">Segurança da Conta Profissional</h1>
            
            <div class="space-y-8">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                    <h3 class="text-sm font-black text-gray-800 uppercase tracking-widest mb-6">Redefinir Senha Profissional</h3>
                    <form class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input type="password" placeholder="Senha Atual" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-green-600 font-bold">
                            <input type="password" placeholder="Nova Senha" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-green-600 font-bold">
                        </div>
                        <button type="submit" class="bg-green-700 text-white px-8 py-3 rounded-xl font-black uppercase tracking-widest text-xs">Alterar Senha</button>
                    </form>
                </div>

                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                    <h3 class="text-sm font-black text-gray-800 uppercase tracking-widest mb-6 italic">Acessos Críticos</h3>
                    <p class="text-sm text-gray-500 mb-6 italic font-medium">Dr., lembre-se de nunca compartilhar sua senha de acesso aos prontuários dos pacientes.</p>
                </div>
            </div>
        </main>
    </div>

</body>

</html>
